<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

DDH Studio Enterprise 10.0

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

    <!-- =====================================
         SIDEBAR
    ====================================== -->

    <aside class="sidebar">

        <div class="logo">

            <h1>

                DDH Studio

            </h1>

            <span>

                Enterprise 10.0

            </span>

        </div>

        <nav class="navigation">

            <button
                class="navButton aktiv"
                data-seite="dashboard">

                📊 Dashboard

            </button>

            <button
                class="navButton"
                data-seite="mitarbeiter">

                👥 Mitarbeiter

            </button>

            <button
                class="navButton"
                data-seite="schichtplan">

                👷 Schichtplan

            </button>

            <button
                class="navButton"
                data-seite="kalender">

                📅 Kalender

            </button>

            <button
                class="navButton"
                data-seite="todos">

                ✅ Aufgaben

            </button>

            <button
                class="navButton"
                data-seite="druck">

                🖨️ Druckcenter

            </button>

        </nav>

    </aside>

    <!-- =====================================
         HAUPTBEREICH
    ====================================== -->

    <main class="hauptbereich">

        <header class="kopfbereich">

            <div>

                Willkommen bei

                <strong>

                    DDH Studio Enterprise

                </strong>

            </div>

        </header>

        <section
            id="inhalt"
            class="inhalt">

        </section>
        <!-- =====================================
             DIALOG
        ====================================== -->
        <!-- =====================================
             BENACHRICHTIGUNGEN
        ====================================== -->

        <div
            id="toastContainer"
            class="toastContainer">

        </div>

        <!-- =====================================
             LADEANZEIGE
        ====================================== -->

        <div
            id="ladeOverlay"
            class="ladeOverlay">

            <div
                class="ladeFenster">

                <div
                    class="spinner">

                </div>

                <p>

                    Bitte warten...

                </p>

            </div>

        </div>
        <div
            id="dialogOverlay"
            class="dialogOverlay">

            <div
                id="dialogFenster"
                class="dialogFenster">

                <div
                    class="dialogKopf">

                    <h2
                        id="dialogTitel">

                    </h2>

                    <button
                        id="dialogSchliessen">

                        ✕

                    </button>

                </div>

                <div
                    id="dialogInhalt">

                </div>

                <div
                    id="dialogFuss"
                    class="dialogFuss">

                </div>

            </div>

        </div>
    </main>

</div>
