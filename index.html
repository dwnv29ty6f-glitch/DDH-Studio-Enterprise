<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DDH Studio Enterprise 10</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <header id="header">

        <div id="logo">

            <h1>DDH Studio</h1>

            <span>Enterprise 10.0</span>

        </div>

        <div id="headerButtons">

            <button id="btnSuche">🔍</button>

            <button id="btnBenutzer">👤</button>

            <button id="btnEinstellungen">⚙️</button>

        </div>

    </header>

    <nav id="navigation">

        <button class="navButton aktiv" data-seite="dashboard">
            📊 Dashboard
        </button>

        <button class="navButton" data-seite="kalender">
            📅 Kalender
        </button>

        <button class="navButton" data-seite="mitarbeiter">
            👥 Mitarbeiter
        </button>

        <button class="navButton" data-seite="schichtplan">
            👷 Schichtplan
        </button>

        <button class="navButton" data-seite="druck">
            🖨️ Druckcenter
        </button>

        <button class="navButton" data-seite="einstellungen">
            ⚙️ Einstellungen
        </button>

    </nav>

    <main id="inhalt">

    </main>

</div>

<script src="js/config.js"></script>
<script src="js/dom.js"></script>
<script src="js/daten.js"></script>
<script src="js/speicher.js"></script>
<script src="js/funktionen.js"></script>
<script src="js/navigation.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/kalender.js"></script>
<script src="js/termine.js"></script>
<script src="js/todos.js"></script>
<script src="js/mitarbeiter.js"></script>
<script src="js/schichtplan.js"></script>
<script src="js/druck.js"></script>
<script src="js/start.js"></script>

</body>

</html>
