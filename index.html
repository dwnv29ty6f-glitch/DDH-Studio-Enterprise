<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#0F4C81">

<title>
DDH Studio Enterprise 10.0
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

    <!-- ==========================================
         SIDEBAR
    =========================================== -->

    <aside id="sidebar">

        <div id="logo">

            <h1>DDH Studio</h1>

            <span>Enterprise 10.0</span>

        </div>

        <nav id="navigation">

            <button
                class="navButton aktiv"
                data-seite="dashboard">

                <span class="icon">📊</span>

                <span>Dashboard</span>

            </button>

            <button
                class="navButton"
                data-seite="mitarbeiter">

                <span class="icon">👥</span>

                <span>Mitarbeiter</span>

            </button>

            <button
                class="navButton"
                data-seite="schichtplan">

                <span class="icon">📅</span>

                <span>Schichtplan</span>

            </button>

            <button
                class="navButton"
                data-seite="kalender">

                <span class="icon">🗓️</span>

                <span>Kalender</span>

            </button>

            <button
                class="navButton"
                data-seite="aufgaben">

                <span class="icon">✅</span>

                <span>Aufgaben</span>

            </button>

            <button
                class="navButton"
                data-seite="druck">

                <span class="icon">🖨️</span>

                <span>Druckcenter</span>

            </button>

            <button
                class="navButton"
                data-seite="einstellungen">

                <span class="icon">⚙️</span>

                <span>Einstellungen</span>

            </button>

        </nav>

    </aside>

    <!-- ==========================================
         HAUPTBEREICH
    =========================================== -->

    <main id="hauptbereich">

        <header id="kopfbereich">

            <div id="kopfLinks">

                <h2 id="seitenTitel">

                    Dashboard

                </h2>

                <div id="seitenPfad">

                    DDH Studio Enterprise

                </div>

            </div>

            <div id="kopfRechts">

                <button id="btnSuche">

                    🔍

                </button>

                <button id="btnBenutzer">

                    👤

                </button>

                <button id="btnEinstellungen">

                    ⚙️

                </button>

            </div>

        </header>

        <section id="inhalt">
                    <div class="dashboard">

                <div class="karte willkommen">

                    <h1>

                        Willkommen bei DDH Studio Enterprise

                    </h1>

                    <p>

                        Betriebsmanagement für
                        DDH Service GmbH

                    </p>

                </div>

                <div class="kachel">

                    <div class="kachelIcon">

                        👥

                    </div>

                    <div class="kachelTitel">

                        Mitarbeiter

                    </div>

                    <div
                        id="dashboardMitarbeiter"
                        class="kachelWert">

                        0

                    </div>

                </div>

                <div class="kachel">

                    <div class="kachelIcon">

                        📅

                    </div>

                    <div class="kachelTitel">

                        Termine

                    </div>

                    <div
                        id="dashboardTermine"
                        class="kachelWert">

                        0

                    </div>

                </div>

                <div class="kachel">

                    <div class="kachelIcon">

                        👷

                    </div>

                    <div class="kachelTitel">

                        Schichten

                    </div>

                    <div
                        id="dashboardSchichten"
                        class="kachelWert">

                        0

                    </div>

                </div>

                <div class="kachel">

                    <div class="kachelIcon">

                        ✅

                    </div>

                    <div class="kachelTitel">

                        Aufgaben

                    </div>

                    <div
                        id="dashboardAufgaben"
                        class="kachelWert">

                        0

                    </div>

                </div>

            </div>
                    </section>

    </main>

    <!-- ==========================================
         DIALOG
    =========================================== -->

    <div
        id="dialogOverlay"
        class="dialogOverlay">

        <div
            id="dialogFenster"
            class="dialogFenster">

            <div class="dialogKopf">

                <h2 id="dialogTitel">

                </h2>

                <button
                    id="dialogSchliessen">

                    ✕

                </button>

            </div>

            <div
                id="dialogInhalt">

            </div>

            <div
                id="dialogFuss">

            </div>

        </div>

    </div>

    <!-- ==========================================
         TOASTS
    =========================================== -->

    <div
        id="toastContainer">

    </div>

    <!-- ==========================================
         LADEBILDSCHIRM
    =========================================== -->

    <div
        id="ladeOverlay">

        <div
            class="ladeFenster">

            <div
                class="spinner">

            </div>

            <p>

                Daten werden geladen...

            </p>

        </div>

    </div>
    </div>

<!-- ==========================================
     JAVASCRIPT
========================================== -->

<script src="js/config.js"></script>

<script src="js/daten.js"></script>

<script src="js/speicher.js"></script>

<script src="js/funktionen.js"></script>

<script src="js/dom.js"></script>

<script src="js/dialoge.js"></script>

<script src="js/navigation.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/mitarbeiter.js"></script>

<script src="js/schichtplan.js"></script>

<script src="js/kalender.js"></script>

<script src="js/termine.js"></script>

<script src="js/todos.js"></script>

<script src="js/druck.js"></script>

<script src="js/start.js"></script>

</body>

</html>
