<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#0F4C81">

<title>

DDH Studio Enterprise 10.0

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

    <!-- ==========================================
         SIDEBAR
    =========================================== -->

    <aside id="sidebar">

        <div id="logo">

            <h1>

                DDH Studio

            </h1>

            <span>

                Enterprise 10.0

            </span>

        </div>

        <nav id="navigation">

            <button
                class="navButton aktiv"
                data-seite="dashboard">

                <span class="icon">📊</span>

                <span>Dashboard</span>

            </button>

            <button
                class="navButton"
                data-seite="mitarbeiter">

                <span class="icon">👥</span>

                <span>Mitarbeiter</span>

            </button>

            <button
                class="navButton"
                data-seite="schichtplan">

                <span class="icon">📅</span>

                <span>Schichtplan</span>

            </button>

            <button
                class="navButton"
                data-seite="kalender">

                <span class="icon">🗓️</span>

                <span>Kalender</span>

            </button>

            <button
                class="navButton"
                data-seite="aufgaben">

                <span class="icon">✅</span>

                <span>Aufgaben</span>

            </button>

            <button
                class="navButton"
                data-seite="druck">

                <span class="icon">🖨️</span>

                <span>Druckcenter</span>

            </button>

            <button
                class="navButton"
                data-seite="einstellungen">

                <span class="icon">⚙️</span>

                <span>Einstellungen</span>

            </button>

        </nav>

    </aside>

    <!-- ==========================================
         HAUPTBEREICH
    =========================================== -->

    <main id="hauptbereich">

        <header id="kopfbereich">

            <div id="kopfLinks">

                <h2 id="seitenTitel">

                    Dashboard

                </h2>

                <div id="seitenPfad">

                    DDH Studio Enterprise

                </div>

            </div>

            <div id="kopfRechts">

                <button id="btnSuche">

                    🔍

                </button>

                <button id="btnBenutzer">

                    👤

                </button>

                <button id="btnEinstellungen">

                    ⚙️

                </button>

            </div>

        </header>

        <section id="inhalt">

            <!-- ==========================================
                 DASHBOARD
            =========================================== -->

            <div
                id="seite-dashboard"
                class="seite aktiv">
                                <div class="dashboard">

                    <div class="karte willkommen">

                        <h1>

                            Willkommen bei DDH Studio Enterprise

                        </h1>

                        <p>

                            Betriebsmanagement für
                            DDH Service GmbH

                        </p>

                    </div>

                    <div class="dashboardGrid">

                        <div class="kachel">

                            <div class="kachelIcon">

                                👥

                            </div>

                            <div class="kachelTitel">

                                Mitarbeiter

                            </div>

                            <div
                                id="dashboardMitarbeiter"
                                class="kachelWert">

                                0

                            </div>

                        </div>

                        <div class="kachel">

                            <div class="kachelIcon">

                                📅

                            </div>

                            <div class="kachelTitel">

                                Termine

                            </div>

                            <div
                                id="dashboardTermine"
                                class="kachelWert">

                                0

                            </div>

                        </div>

                        <div class="kachel">

                            <div class="kachelIcon">

                                👷

                            </div>

                            <div class="kachelTitel">

                                Schichten

                            </div>

                            <div
                                id="dashboardSchichten"
                                class="kachelWert">

                                0

                            </div>

                        </div>

                        <div class="kachel">

                            <div class="kachelIcon">

                                ✅

                            </div>

                            <div class="kachelTitel">

                                Aufgaben

                            </div>

                            <div
                                id="dashboardAufgaben"
                                class="kachelWert">

                                0

                            </div>

                        </div>

                    </div>

                    <div class="karte">

                        <h2>

                            Schnellzugriff

                        </h2>

                        <div class="schnellzugriffe">

                            <button
                                class="hauptButton"
                                data-seite="mitarbeiter">

                                👥 Mitarbeiter

                            </button>

                            <button
                                class="hauptButton"
                                data-seite="schichtplan">

                                📅 Schichtplan

                            </button>

                            <button
                                class="hauptButton"
                                data-seite="kalender">

                                🗓️ Kalender

                            </button>

                            <button
                                class="hauptButton"
                                data-seite="aufgaben">

                                ✅ Aufgaben

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ==========================================
                 MITARBEITER
            =========================================== -->

            <div
    id="seite-mitarbeiter"
    class="seite">

</div>

            <!-- ==========================================
                 SCHICHTPLAN
            =========================================== -->

          <div
    id="seite-schichtplan"
    class="seite">

</div>

            <!-- ==========================================
                 KALENDER
            =========================================== -->

           <div
    id="seite-kalender"
    class="seite">

</div>

            <!-- ==========================================
                 AUFGABEN
            =========================================== -->

           <div
    id="seite-aufgaben"
    class="seite">

</div>
                        <!-- ==========================================
                 DRUCKCENTER
            =========================================== -->

           <div
    id="seite-druck"
    class="seite">

</div>

            <!-- ==========================================
     EINSTELLUNGEN
========================================== -->

<div
    id="seite-einstellungen"
    class="seite">

</div>

</section>

</main>
<!-- ==========================================
     DIALOG
========================================== -->

<div
    id="dialogOverlay"
    class="dialogOverlay">

    <div
        id="dialogFenster"
        class="dialogFenster">

        <div class="dialogKopf">

            <h2 id="dialogTitel"></h2>

            <button
                id="dialogSchliessen">

                ✕

            </button>

        </div>

        <div id="dialogInhalt"></div>

        <div id="dialogFuss"></div>

    </div>

</div>

<!-- ==========================================
     JAVASCRIPT
========================================== -->

<script src="app.js"></script>

<script src="js/core/config.js"></script>
<script src="js/core/dom.js"></script>
<script src="js/core/funktionen.js"></script>
<script src="js/core/speicher.js"></script>
<script src="js/core/navigation.js"></script>

<script src="js/daten.js"></script>

<script src="js/modules/dashboard.js"></script>
<script src="js/modules/mitarbeiter.js"></script>
<script src="js/schichtplan.js"></script>
<script src="js/modules/kalender.js"></script>
<script src="js/modules/termine.js"></script>
<script src="js/modules/todos.js"></script>
<script src="js/modules/druck.js"></script>

<script src="js/dialoge.js"></script>

<script src="js/core/start.js"></script>
</body>

</html>
