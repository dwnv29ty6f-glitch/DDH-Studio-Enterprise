<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DDH Studio Enterprise</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>DDH Studio</h2>

        <button id="neu">
            Neues Projekt
        </button>

        <div id="projekte"></div>

    </div>

    <!-- Hauptbereich -->

    <div class="main">

        <!-- Kopf -->

        <div class="topbar">

            <button id="vorherigerMonat">
                ◀
            </button>

            <h1 id="monatTitel"></h1>

            <button id="naechsterMonat">
                ▶
            </button>

        </div>

        <!-- Inhalt -->

        <div class="content">

            <!-- Kalender -->

            <div class="kalenderBox">

                <div class="wochentage">

                    <div>Mo</div>
                    <div>Di</div>
                    <div>Mi</div>
                    <div>Do</div>
                    <div>Fr</div>
                    <div>Sa</div>
                    <div>So</div>

                </div>

                <div id="tage"></div>

            </div>

            <!-- Termine -->

            <div class="terminBox">

                <h2 id="ausgewaehltesDatum">
                    Tag auswählen
                </h2>

                <input
                    id="termin"
                    type="text"
                    placeholder="Termin eingeben">

                <button id="speichernTermin">
                    Termin speichern
                </button>

                <div id="terminListe"></div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

    <script>

        if ("serviceWorker" in navigator) {

            navigator.serviceWorker.register("sw.js");

        }

    </script>

</body>

</html>
