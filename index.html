<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DDH Studio 2.0</title>

<link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="sidebar">
    <h2>DDH Studio</h2>

    <button id="neu">
        Neues Projekt
    </button>

    <div id="projekte"></div>
</div>

<div class="main">
    <div class="kalender">
    <h2>📅 Kalender</h2>

    <input type="date" id="datum">
    <input type="text" id="termin" placeholder="Termin eingeben">

    <button id="speichernTermin">
        Termin speichern
    </button>

    <ul id="terminListe"></ul>
</div>

    <div class="topbar">
        <h1>DDH Studio 2.0</h1>
    </div>

    <div class="arbeitsbereich">
        <h2>Willkommen</h2>

        <p>
            Erstelle links dein erstes Projekt.
        </p>
    </div>

</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
