<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DDH Studio Enterprise</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <div class="main">

        <header class="topbar">

            <button id="vorherigerMonat">◀</button>

            <h1 id="monatTitel"></h1>

            <button id="naechsterMonat">▶</button>

        </header>

        <div class="content">

            <section class="kalenderBereich">

                <div class="wochentage">
                    <div>Mo</div>
                    <div>Di</div>
                    <div>Mi</div>
                    <div>Do</div>
                    <div>Fr</div>
                    <div>Sa</div>
                    <div>So</div>
                </div>

                <div id="tage"></div>

            </section>

            <aside class="terminBereich">

                <h2 id="ausgewaehltesDatum">
                    Kein Tag ausgewählt
                </h2>

                <input
                    type="time"
                    id="uhrzeit">

                <input
                    type="text"
                    id="termin"
                    placeholder="Termin eingeben">

                <button id="speichernTermin">
                    Termin speichern
                </button>

                <div id="terminListe"></div>

            </aside>

        </div>

    </div>

    <script src="app.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }
    </script>

</body>

</html>
