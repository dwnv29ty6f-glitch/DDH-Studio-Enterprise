<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDH Studio Enterprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="hauptHeader">
            <div class="headerLinks"><button id="vorherigerMonat">◀</button></div>
            <div class="headerMitte"><h1>DDH Studio</h1><p id="headerUntertitel">Enterprise 9.0</p></div>
            <div class="headerRechts"><button id="naechsterMonat">▶</button></div>
        </header>

        <nav id="navigation">
            <button class="navButton aktiv" data-seite="dashboard">📊 Dashboard</button>
            <button class="navButton" data-seite="kalender">📅 Kalender</button>
            <button class="navButton" data-seite="schichtplan">👷 Schichtplan</button>
        </nav>

        <section id="seite-dashboard" class="seite aktiv"><div class="modul"><div id="heuteTermine">0</div></div></section>
        <section id="seite-kalender" class="seite"><div class="modul"><div id="tage"></div><div id="terminListe"></div></div></section>
        <section id="seite-schichtplan" class="seite"><div class="modul"><table id="schichtTabelle"><tbody id="schichtplanBody"></tbody></table></div></section>
    </div>

    
    <!-- Scripte laden -->
    <script src="js/dom.js" defer></script>
    <script src="js/daten.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/speicher.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/dashboard.js" defer></script>
    <script src="js/kalender.js" defer></script>
    <script src="js/termine.js" defer></script>
    <script src="js/todos.js" defer></script>
    <script src="js/mitarbeiter.js" defer></script>
    <script src="js/schichtplan.js" defer></script>
    <script src="js/druck.js" defer></script>
    <script src="js/funktionen.js" defer></script>
    <script src="js/start.js" defer></script>
</body>
</html>
</html>
