<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDH Studio Enterprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="hauptHeader">
            <div class="headerLinks"><button id="vorherigerMonat">◀</button></div>
            <div class="headerMitte"><h1>DDH Studio</h1><p id="headerUntertitel">Enterprise 9.0</p></div>
            <div class="headerRechts"><button id="naechsterMonat">▶</button></div>
        </header>

        <nav id="navigation">
            <button class="navButton aktiv" data-seite="dashboard">📊 Dashboard</button>
            <button class="navButton" data-seite="kalender">📅 Kalender</button>
            <button class="navButton" data-seite="schichtplan">👷 Schichtplan</button>
        </nav>

        <!-- DASHBOARD -->
        <section id="seite-dashboard" class="seite aktiv">
            <div class="modul"><div id="heuteTermine">0</div></div>
        </section>
        
        <!-- KALENDER -->
        <section id="seite-kalender" class="seite">
            <div class="modul"><div id="tage"></div><div id="terminListe"></div></div>
        </section>
        
        <!-- SCHICHTPLAN -->
        <section id="seite-schichtplan" class="seite">
            <div class="modul">
                <table style="width: 100%; border-collapse: collapse;">
                    <tbody id="schichtplanBody"></tbody>
                </table>
                <div style="padding: 20px;">
                    <button id="addMitarbeiterBtn" style="width: 100%;">+ Neuen Mitarbeiter hinzufügen</button>
                </div>
            </div>
        </section>

        <!-- BEARBEITEN -->
        <section id="seite-bearbeiten" class="seite">
            <div class="modul">
                <h2>Mitarbeiter verwalten</h2>
                <input type="text" id="editName" placeholder="Name">
                <input type="text" id="editRolle" placeholder="Rolle">
                <div style="display: flex; gap: 10px;">
                    <button id="saveMitarbeiterBtn" style="flex:2;">Speichern</button>
                    <button id="deleteMitarbeiterBtn" style="flex:1; background:#e74c3c;">Löschen</button>
                </div>
                <button id="cancelMitarbeiterBtn" style="width:100%; margin-top:10px; background:#555;">Abbrechen</button>
            </div>
        </section>
    </div>

    <!-- SCHICHT-DIALOG -->
    <div id="schichtDialog" class="schichtDialog">
        <div class="schichtFenster">
            <h2>Schicht auswählen</h2>
            <div class="schichtAuswahlGrid">
                <button class="schichtAuswahl" data-schicht="Früh">Früh</button>
                <button class="schichtAuswahl" data-schicht="Spät">Spät</button>
                <button class="schichtAuswahl" data-schicht="Nacht">Nacht</button>
                <button class="schichtAuswahl" data-schicht="Frei">Frei</button>
            </div>
            <button id="schichtLoeschen" style="background:#e74c3c; width:100%; margin-top:10px;">Schicht löschen</button>
            <button id="schichtAbbrechen" style="width:100%; margin-top:10px;">Abbrechen</button>
        </div>
    </div>

    <!-- SCRIPTE -->
    <script src="js/dom.js" defer></script>
    <script src="js/daten.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/speicher.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/dashboard.js" defer></script>
    <script src="js/kalender.js" defer></script>
    <script src="js/termine.js" defer></script>
    <script src="js/todos.js" defer></script>
    <script src="js/mitarbeiter.js" defer></script>
    <script src="js/schichtplan.js" defer></script>
    <script src="js/druck.js" defer></script>
    <script src="js/funktionen.js" defer></script>
    <script src="js/start.js" defer></script>
    <!-- Schicht-Popup -->
<div id="schichtDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#222; padding:20px; border-radius:10px; width:80%; text-align:center;">
        <h3 style="color:white;">Dienst wählen</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="setzeSchicht('Früh')">Früh</button>
            <button onclick="setzeSchicht('Spät')">Spät</button>
            <button onclick="setzeSchicht('Nacht')">Nacht</button>
            <button onclick="setzeSchicht('Frei')">Frei</button>
        </div>
        <button onclick="schliesseDialog()" style="margin-top:15px; width:100%; background:#555;">Abbrechen</button>
    </div>
</div>
</body>
</html>
