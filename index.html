<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DDH Studio Enterprise 4.0</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<button id="vorherigerMonat">◀</button>

<h1 id="monatTitel"></h1>

<button id="naechsterMonat">▶</button>

</header>

<main>

<section id="kalender">

<div class="wochentage">

<div>Mo</div>
<div>Di</div>
<div>Mi</div>
<div>Do</div>
<div>Fr</div>
<div>Sa</div>
<div>So</div>

</div>

<div id="tage"></div>

</section>

<aside>

<h2 id="ausgewaehltesDatum">
Tag auswählen
</h2>

<input
type="time"
id="uhrzeit">

<select id="kategorie">

<option value="Privat">🏠 Privat</option>
<option value="Arbeit">💼 Arbeit</option>
<option value="Familie">👨‍👩‍👧 Familie</option>
<option value="Schule">🎓 Schule</option>
<option value="Urlaub">✈️ Urlaub</option>
<option value="Geburtstag">🎂 Geburtstag</option>
<option value="Sonstiges">📌 Sonstiges</option>

</select>

<input
type="text"
id="termin"
placeholder="Termin eingeben">

<button id="speichernTermin">

Termin speichern

</button>

<div id="terminListe"></div>

<hr>

<h2>

📁 To-do Projekt

</h2>

<select id="todoProjekt">

<option value="Privat">🏠 Privat</option>

<option value="DDH Studio">🎬 DDH Studio</option>

<option value="Enterprise">🚀 Enterprise</option>

<option value="Arbeit">💼 Arbeit</option>

<option value="Schule">🎓 Schule</option>

<option value="Familie">👨‍👩‍👧 Familie</option>

<option value="Urlaub">✈️ Urlaub</option>

<option value="Sonstiges">📌 Sonstiges</option>

</select>

<hr>

<h2>

✅ To-do-Liste

</h2>

<input
type="text"
id="todoText"
placeholder="Neue Aufgabe">

<select id="todoPrioritaet">

<option value="hoch">
🔴 Hoch
</option>

<option value="mittel">
🟠 Mittel
</option>

<option value="niedrig">
🟢 Niedrig
</option>

</select>

<button id="todoSpeichern">

Aufgabe hinzufügen

</button>

<div id="todoListe"></div>

</aside>

</main>

</div>

<script src="app.js"></script>

</body>

</html>
